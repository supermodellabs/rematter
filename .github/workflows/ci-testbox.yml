name: Blacksmith Testbox
on:
  workflow_dispatch:
    inputs:
      testbox_id:
        type: string
        description: "Testbox session ID"
        required: true
  pull_request:
    paths:
      - ".github/workflows/**"
jobs:
  uv-testbox:
    name: Testbox uv Python v3.13
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --dev
      - name: Capture PATH for bash environment
        shell: bash
        run: |
          BASH_ENV_FILE="$RUNNER_TEMP/gha-testbox-path.env"
          printf 'export PATH=%q\n' "$PATH" > "$BASH_ENV_FILE"
          echo "BASH_ENV=$BASH_ENV_FILE" >> "$GITHUB_ENV"
      - name: Begin Testbox
        uses: useblacksmith/begin-testbox@v2
        with:
          testbox_id: ${{ inputs.testbox_id }}
      - name: Run Testbox
        uses: useblacksmith/run-testbox@v2
        if: always()
