# Config
link_path_prefix: /sky
render: false

# Schema
# Loosely ordered by data type
# enums -> lists -> bools -> strings -> timestamps
# last prop is always 'publish' boolean
# as it is the critical switch in the rematter system
properties:
  status:
    type: string
    required: false
    enum: [not_started, in_progress, on_hold, done, cancelled]
    default: not_started
  creators:
    type: list
    required: false
  own:
    type: bool
    required: false
    default: false
    sync: false
  is_meta_catalog:
    type: bool
    required: false
    default: false
  is_api:
    type: bool
    required: false
    default: false
  url:
    type: string
    required: false
  hero:
    type: string
    required: false
    requires: [heroAlt]
  heroAlt:
    type: string
    required: false
    requires: [hero]
  created:
    type: timestamp
    required: true
    default: "%Y-%m-%d %H:%M"
    sync: false
  modified:
    type: timestamp
    required: true
    default: "%Y-%m-%d %H:%M"
  synced:
    type: timestamp
    required: true
    default: null
  publish:
    type: bool
    required: true
    default: false
    sync: false
